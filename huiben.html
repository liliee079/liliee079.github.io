<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大大小小 - Love Is Everything</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
            padding: 20px;
            user-select: none;
        }

        .book-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 1100px;
        }

        .book-header {
            text-align: center;
            color: #5a4a3a;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .book-header:hover {
            opacity: 0.7;
        }

        .book-back-hint {
            font-size: 11px;
            color: #b8a898;
            letter-spacing: 2px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.4s;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 300;
        }

        .book-header:hover .book-back-hint {
            opacity: 1;
        }

        .book-title {
            font-size: 28px;
            font-family: 'Noto Serif SC', serif;
            font-weight: 400;
            letter-spacing: 10px;
            margin-bottom: 2px;
        }

        .book-subtitle {
            font-size: 12px;
            color: #a09888;
            letter-spacing: 5px;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 300;
        }

        .book-main {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .nav-arrow {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border: 1.5px solid #c8beb0;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #8a7a6a;
            transition: all 0.3s;
        }

        .nav-arrow:hover {
            background: #fff;
            border-color: #8a7a6a;
            color: #5a4a3a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .nav-arrow:active {
            transform: scale(0.92);
        }

        .nav-arrow.disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .book-container {
            flex: 1;
            aspect-ratio: 21/9;
            max-width: 900px;
            perspective: 2000px;
            position: relative;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 3px 8px 8px 3px;
            box-shadow:
                -4px 0 12px rgba(0,0,0,0.06),
                0 8px 30px rgba(0,0,0,0.12),
                0 2px 6px rgba(0,0,0,0.06);
            background: #e8e0d4;
            overflow: hidden;
        }

        .book-spine {
            position: absolute;
            top: 0;
            left: 0;
            width: 18px;
            height: 100%;
            background: linear-gradient(to right, #d4c8b8, #e0d6c8);
            z-index: 10;
            border-right: 1px solid #c8beb0;
            box-shadow: inset -2px 0 4px rgba(0,0,0,0.05);
            pointer-events: none;
        }

        .book-spine::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 30px;
            background: rgba(90,74,58,0.15);
            border-radius: 2px;
        }

        .page-view {
            position: absolute;
            top: 0;
            left: 18px;
            width: calc(100% - 18px);
            height: 100%;
            background: #faf8f4;
            overflow: hidden;
        }

        .page-stay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .page-stay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #faf8f4;
        }

        .page-flip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: none;
            pointer-events: none;
        }

        .page-flip .flip-front,
        .page-flip .flip-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .page-flip .flip-front {
            z-index: 2;
        }

        .page-flip .flip-front img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #faf8f4;
        }

        .page-flip .flip-back {
            z-index: 1;
            transform: rotateY(180deg);
            background: #f0ece4;
        }

        .page-flip .flip-back::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.02), transparent 30%, transparent 70%, rgba(0,0,0,0.02));
        }

        .page-flip.flipping-forward {
            animation: flipForward 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .page-flip.flipping-backward {
            transform-origin: right center;
            animation: flipBackward 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes flipForward {
            0% { transform: perspective(1600px) rotateY(0deg); }
            100% { transform: perspective(1600px) rotateY(-180deg); }
        }

        @keyframes flipBackward {
            0% { transform: perspective(1600px) rotateY(0deg); }
            100% { transform: perspective(1600px) rotateY(180deg); }
        }

        .page-number {
            text-align: center;
            font-size: 13px;
            color: #a09888;
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 2px;
        }

        .page-number span {
            margin: 0 10px;
        }

        .page-progress {
            width: 260px;
            height: 2px;
            background: #e0d8cc;
            border-radius: 2px;
            overflow: hidden;
        }

        .page-progress-bar {
            height: 100%;
            background: #b8a898;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .click-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #b8a898;
            letter-spacing: 1px;
            opacity: 0;
            animation: hintFade 3s ease-out forwards;
            pointer-events: none;
        }

        @keyframes hintFade {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .book-wrapper { gap: 14px; }
            .book-main { gap: 6px; }
            .nav-arrow { width: 36px; height: 36px; font-size: 16px; }
            .book-title { font-size: 20px; letter-spacing: 6px; }
            .book-subtitle { font-size: 10px; }
            .book-container { max-width: 100%; }
            .book-spine { width: 12px; }
            .page-view { left: 12px; width: calc(100% - 12px); }
            .page-progress { width: 160px; }
        }
    </style>
</head>
<body>
    <div class="book-wrapper">
        <div class="book-header" onclick="goHome()">
            <div class="book-title">大大小小</div>
            <div class="book-subtitle">Love Is Everything</div>
            <div class="book-back-hint">← 返回作品集</div>
        </div>

        <div class="book-main">
            <button class="nav-arrow" id="prevBtn" onclick="prevPage()">‹</button>

            <div class="book-container" id="bookContainer">
                <div class="book" id="book">
                    <div class="book-spine"></div>
                    <div class="page-view" id="pageView">
                        <div class="page-stay" id="pageStay"></div>
                        <div class="page-flip" id="pageFlip">
                            <div class="flip-front" id="flipFront"></div>
                            <div class="flip-back"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="nav-arrow" id="nextBtn" onclick="nextPage()">›</button>
        </div>

        <div class="page-number">
            <span id="pageLabel">1 / 14</span>
        </div>
        <div class="page-progress">
            <div class="page-progress-bar" id="progressBar" style="width: 7.14%"></div>
        </div>
    </div>

    <div class="click-hint">← 点击标题返回作品集 · 点击左右两侧翻页</div>

    <script>
        const TOTAL = 14;
        let currentPage = 1;
        let isFlipping = false;

        const pageStay = document.getElementById('pageStay');
        const pageFlip = document.getElementById('pageFlip');
        const flipFront = document.getElementById('flipFront');
        const pageLabel = document.getElementById('pageLabel');
        const progressBar = document.getElementById('progressBar');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function imgSrc(n) {
            return `huiben-images/${n}.png`;
        }

        function updateUI() {
            pageLabel.textContent = `${currentPage} / ${TOTAL}`;
            progressBar.style.width = `${(currentPage / TOTAL) * 100}%`;
            prevBtn.classList.toggle('disabled', currentPage <= 1);
            nextBtn.classList.toggle('disabled', currentPage >= TOTAL);
        }

        function showPage(n) {
            pageStay.innerHTML = `<img src="${imgSrc(n)}" alt="page ${n}" draggable="false">`;
        }

        function preloadImage(n) {
            const img = new Image();
            img.src = imgSrc(n);
        }

        function init() {
            for (let i = 1; i <= TOTAL; i++) {
                preloadImage(i);
            }
            showPage(1);
            flipFront.innerHTML = `<img src="${imgSrc(1)}" alt="page 1" draggable="false">`;
            updateUI();
        }

        function nextPage() {
            if (isFlipping || currentPage >= TOTAL) return;
            isFlipping = true;

            const next = currentPage + 1;

            flipFront.innerHTML = `<img src="${imgSrc(currentPage)}" alt="page ${currentPage}" draggable="false">`;
            showPage(next);

            pageFlip.style.transformOrigin = 'left center';
            pageFlip.classList.remove('flipping-backward');
            void pageFlip.offsetWidth;
            pageFlip.classList.add('flipping-forward');

            pageFlip.addEventListener('animationend', function onEnd() {
                pageFlip.classList.remove('flipping-forward');
                pageFlip.removeEventListener('animationend', onEnd);
                flipFront.innerHTML = `<img src="${imgSrc(next)}" alt="page ${next}" draggable="false">`;
                pageFlip.style.transform = 'none';
                currentPage = next;
                updateUI();
                isFlipping = false;
            });
        }

        function prevPage() {
            if (isFlipping || currentPage <= 1) return;
            isFlipping = true;

            const prev = currentPage - 1;

            flipFront.innerHTML = `<img src="${imgSrc(currentPage)}" alt="page ${currentPage}" draggable="false">`;
            showPage(prev);

            pageFlip.style.transformOrigin = 'right center';
            pageFlip.classList.remove('flipping-forward');
            void pageFlip.offsetWidth;
            pageFlip.classList.add('flipping-backward');

            pageFlip.addEventListener('animationend', function onEnd() {
                pageFlip.classList.remove('flipping-backward');
                pageFlip.removeEventListener('animationend', onEnd);
                flipFront.innerHTML = `<img src="${imgSrc(prev)}" alt="page ${prev}" draggable="false">`;
                pageFlip.style.transform = 'none';
                currentPage = prev;
                updateUI();
                isFlipping = false;
            });
        }

        document.getElementById('book').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const mid = rect.width / 2;
            const spine = rect.width * 0.08;
            if (x < spine) return;
            if (x < mid) {
                prevPage();
            } else {
                nextPage();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextPage();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevPage();
            }
        });

        let touchStartX = 0;
        document.getElementById('book').addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        document.getElementById('book').addEventListener('touchend', function(e) {
            const rect = this.getBoundingClientRect();
            const touchX = e.changedTouches[0].clientX;
            const dx = touchX - touchStartX;
            const spine = rect.width * 0.08;
            const touchRelX = touchStartX - rect.left;

            if (touchRelX < spine) return;

            if (Math.abs(dx) < 20) {
                if (touchRelX < rect.width / 2) prevPage();
                else nextPage();
            } else if (dx > 30) {
                prevPage();
            } else if (dx < -30) {
                nextPage();
            }
        }, { passive: true });

        function goHome() {
            window.location.href = 'lizzi_profile.html';
        }

        init();
    </script>
</body>
</html>
